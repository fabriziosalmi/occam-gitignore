[project]
name = "occam-gitignore"
version = "0.3.0"
description = "Deterministic, content-addressed .gitignore generator. Same input always yields the same output, byte-for-byte."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Fabrizio Salmi" }]
keywords = ["gitignore", "deterministic", "reproducible", "sbom", "slsa", "ci", "supply-chain"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Intended Audience :: System Administrators",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Build Tools",
  "Topic :: Software Development :: Version Control :: Git",
  "Topic :: System :: Software Distribution",
  "Typing :: Typed",
]
dependencies = [
  "occam-gitignore-core>=0.3.0,<0.4",
  "typer>=0.12",
]

[project.urls]
Homepage = "https://github.com/fabriziosalmi/gitignore"
Documentation = "https://fabriziosalmi.github.io/gitignore/"
Repository = "https://github.com/fabriziosalmi/gitignore"
Issues = "https://github.com/fabriziosalmi/gitignore/issues"
Changelog = "https://github.com/fabriziosalmi/gitignore/blob/main/CHANGELOG.md"

[project.scripts]
occam-gitignore = "occam_gitignore_cli.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

[tool.hatch.build.targets.wheel]
packages = ["src/occam_gitignore_cli"]

[tool.hatch.build.targets.sdist]
include = [
  "src/**",
  "hatch_build.py",
  "README.md",
  "pyproject.toml",
]

[tool.hatch.build.targets.sdist.force-include]
"../../data/rules_table.json" = "data/rules_table.json"
"../../data/templates" = "data/templates"
